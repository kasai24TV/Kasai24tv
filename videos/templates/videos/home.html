<!DOCTYPE html>
<html>
<head>
    <title>Kasai24 TV</title>
    <style>
        body { font-family: Arial; background: #111; color: white; padding: 20px; text-align: center; }
        h1 { color: red; }
        .video { background: #222; padding: 15px; margin: 10px auto; border-radius: 10px; max-width: 600px; }
        a { color: red; text-decoration: none; }
    </style>
</head>
<body>
    <h1>🔴 KASAI24 TV</h1>
    {% for video in videos %}
        <div class="video">
            <h2>{{ video.titre }}</h2>
            <p>{{ video.description }}</p>
            <a href="{{ video.video_url }}" target="_blank">▶ Regarder</a>
        </div>
    {% empty %}
        <p>Aucune vidéo pour le moment. Ajoute-en dans /admin/</p>
    {% endfor %}
</body>
</html>
